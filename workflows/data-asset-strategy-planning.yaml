id: data-asset-strategy-planning
name: 数据资产战略规划流
standard: T/MIITEC 025-2024
description: >-
  由首席数据官发起，联动规划师、运营师、策划师完成从战略制定、能力盘点、
  路线图编制到产品化落地规划的全链路数据资产战略闭环。

roles:
  - id: DAM-01
    name: 首席数据官
    role: 战略方向制定与组织协调
  - id: DAM-02
    name: 数据资产规划师
    role: 能力差距分析与路线图编制
  - id: DAM-05
    name: 数据资产运营师
    role: 资产盘点与现状摸底
  - id: DAM-06
    name: 数据资产运营策划师
    role: 数据产品化与运营策划

steps:
  - "[DAM-01] 战略目标制定：明确数据资产化方向、年度目标、KPI 体系"
  - "    交付物：《数据战略方案》《年度数据工作 OKR》"
  - "[DAM-05] 资产盘点与现状摸底：全量数据资产清查、质量评估、价值初筛"
  - "    交付物：《数据资产清册》《数据质量评估报告》"
  - "[DAM-02] 能力差距分析与路线图编制：对标 DCMM / 行业标杆，识别短板"
  - "    交付物：《能力差距分析报告》《三年建设路线图》"
  - "[DAM-06] 产品化与运营策划：将高价值数据资产设计为可交易/可共享的数据产品"
  - "    交付物：《数据产品规划书》《运营策略方案》《定价策略》"

decision_gate:
  - name: 战略审批
    owner: DAM-01
    rule: 战略方案须经管理层/数据治理委员会审议通过
  - name: 投资优先级
    owner: DAM-02
    rule: 路线图须明确资源投入优先级，高优项目预算落实后方可启动

acceptance:
  - 战略方案获管理层批准
  - 资产清册覆盖率 ≥ 90%
  - 路线图里程碑可量化可考核
  - 至少 3 个数据产品进入 MVP 阶段

related_standards:
  - GB/T 36073-2018
  - DCMM
  - T/MIITEC 025-2024
