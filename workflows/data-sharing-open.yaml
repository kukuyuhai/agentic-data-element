id: data-sharing-open
name: 数据共享开放流
standard: T/MIITEC 025-2024
description: >-
  面向企业内部跨部门数据共享及对外数据开放场景，从需求收集、合规脱敏、
  产品设计到上架发布的全流程管控，确保数据可用不可滥。

roles:
  - id: DAM-05
    name: 数据资产运营师
    role: 共享需求收集与资产供给
  - id: DAM-04
    name: 数据资产安全合规师
    role: 分级脱敏与合规审批
  - id: DAM-06
    name: 数据资产运营策划师
    role: API/数据产品设计与定价
  - id: DAT-03
    name: 数据交易运营师
    role: 上架发布与运营推广

steps:
  - "[DAM-05] 共享需求收集与资产匹配：汇总需求方诉求、匹配已有数据资产"
  - "    交付物：《共享需求清单》《资产匹配方案》"
  - "[DAM-04] 分级脱敏与合规审批：数据分类分级、脱敏策略制定、合规评审"
  - "    交付物：《脱敏方案》《合规审批单》《数据使用协议模板》"
  - "[DAM-06] 数据产品设计与定价：API 封装、SLA 制定、定价与计量策略"
  - "    交付物：《数据产品说明书》《API 接口文档》《定价方案》"
  - "[DAT-03] 上架发布与运营推广：平台上架、用户引导、效果监控"
  - "    交付物：《上架配置单》《运营推广方案》《共享效果报告》"

decision_gate:
  - name: 合规审批
    owner: DAM-04
    rule: 含敏感数据的共享须完成脱敏验证并获得数据安全委员会审批
  - name: SLA 承诺
    owner: DAM-06
    rule: 数据产品须明确可用性、时效性、准确性 SLA，不满足则不得上架

acceptance:
  - 共享数据脱敏验证通过且可追溯
  - API 上架后 SLA 达标率 ≥ 99.5%
  - 数据使用协议签署率 100%
  - 月度共享效果报告按时产出

related_standards:
  - GB/T 38667-2020
  - GB/T 40685-2021
  - 数据安全法
