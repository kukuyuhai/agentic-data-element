id: data-trading-listing
name: 数据产品挂牌交易流
standard: T/MIITEC 025-2024
description: >-
  从数据产品设计、合规评审、估值定价、上架挂牌到产权类交易签订，完整覆盖
  数据产品从企业内部到公开交易市场的挂牌流程。

roles:
  - id: DAT-01
    name: 数据交易规划师
    role: 产品设计与规划
  - id: DAT-02
    name: 数据交易安全合规师
    role: 合规评审守门
  - id: DAM-07
    name: 数据资产评估计价师
    role: 定价估值
  - id: DAT-03
    name: 数据交易运营师
    role: 上架运营
  - id: DAT-05
    name: 数据交易经纪师
    role: 撮合成交（非产权）
  - id: DAT-06
    name: 数据产权交易师
    role: 产权类交易（含三权流转）

steps:
  - "[DAT-01] 数据产品设计：形态、字段、SLA、定价模型"
  - "    交付物：《数据产品说明书》"
  - "[DAT-02] 合规评审：分类分级、KYC/KYB、跨境评估"
  - "    交付物：《合规评审意见书》"
  - "[DAM-07] 估值定价：市场法+成本法+收益法交叉验证"
  - "    交付物：《定价方案》"
  - "[DAT-03] 上架挂牌：交易所/自有平台配置、活动预热"
  - "    交付物：《挂牌单》《上架运营方案》"
  - "[DAT-05 or DAT-06] 撮合/产权交易签订"
  - "    交付物：《交易合同》《撮合意向书》或《产权交易结构方案》"

decision_gate:
  - name: 合规评审
    owner: DAT-02
    rule: 意见书结论必须为"通过"或"有条件通过"（且条件已落实），否则不得上架
  - name: 产权类交易识别
    owner: DAT-06
    rule: 若交易涉及数据资源持有权/加工使用权/产品经营权转让，转入 DAT-06 流程

acceptance:
  - 产品说明书与合规评审留痕齐全
  - 挂牌 30 天内实现首单
  - 交易合同同步登记
