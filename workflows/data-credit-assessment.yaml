id: data-credit-assessment
name: 企业数据信用评估流
standard: T/MIITEC 025-2024
description: >-
  为企业出具独立、可追溯的数据信用评估结论，用于融资、供应链、招投标场景。
  联动内部信用管理体系与独立第三方评价体系。

roles:
  - id: DAM-10
    name: 数据信用管理师
    role: 内部信用体系与数据供给
  - id: DAM-11
    name: 数据信用评价师
    role: 独立评级出具
  - id: DAM-04
    name: 数据资产安全合规师
    role: 合规与数据授权

steps:
  - "[DAM-04] 数据合规与授权：确认信用评估所用数据源合法授权"
  - "    交付物：《数据授权清单》《合规意见》"
  - "[DAM-10] 数据信用管理：内部数据接入、评分卡开发、日常监控"
  - "    交付物：《信用管理体系文件》《内部评分结果》《监控预警》"
  - "[DAM-11] 独立信用评价：方法论 → 定量 → 定性 → 交叉验证 → 评级"
  - "    交付物：《信用评价报告》《跟踪评级安排》"

decision_gate:
  - name: 数据合规
    owner: DAM-04
    rule: 未获得授权或超范围使用的数据不得进入评估流程
  - name: 评级独立性
    owner: DAM-11
    rule: 评级方与被评方无利益关联，方法论、指标权重公开可查

acceptance:
  - 评级方法论透明
  - 内部评分与外部评级差异 ≤ 1 个等级
  - 报告可对接融资机构 / 供应链平台
