id: data-asset-onboarding
name: 数据资产入表标准作业流
standard: T/MIITEC 025-2024
description: >-
  从数据资产确权、评估、入表到保荐上会，完整覆盖企业数据资产入表全链路。
  依据财政部《企业数据资源相关会计处理暂行规定》（财会〔2023〕11号）。

roles:
  - id: DAM-03
    name: 数据资产确权师
    role: 上游·权属界定
  - id: DAM-07
    name: 数据资产评估计价师
    role: 中游·价值评估
  - id: DAM-08
    name: 数据资产入表工程师
    role: 下游·会计入表
  - id: DAM-09
    name: 数据资产入表保荐师
    role: 保荐·合规审核

steps:
  - "[DAM-03] 完成数据资产确权：权利属性、权利主体、权利内容"
  - "    交付物：《数据资产权属确认书》《权属登记回执》"
  - "[DAM-07] 完成数据资产评估：成本法 / 收益法 / 市场法"
  - "    交付物：《数据资产评估报告》《定价方案》"
  - "[DAM-08] 完成会计确认：无形资产 / 存货 / 开发支出 三分类判定"
  - "    交付物：《入表判定单》《会计分录》《ERP 凭证》"
  - "[DAM-09] 完成保荐上会：合规审核 + 审计对接 + 上会答辩"
  - "    交付物：《数据资产入表保荐意见书》《上会答辩材料》"

acceptance:
  - 权属清晰可追溯
  - 评估方法与依据充分
  - 会计处理符合 CAS 与财会〔2023〕11 号
  - 保荐意见书获得三方鉴证

related_standards:
  - GB/T 40685-2021
  - 财会〔2023〕11 号
