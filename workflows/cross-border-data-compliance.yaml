id: cross-border-data-compliance
name: 跨境数据流通合规流
standard: T/MIITEC 025-2024
description: >-
  针对数据跨境传输、境外交易场景，完成安全评估、合规审查、方案设计到执行运营的
  全链路合规管控。依据《数据出境安全评估办法》《个人信息出境标准合同办法》等法规。

roles:
  - id: DAM-04
    name: 数据资产安全合规师
    role: 数据出境安全评估与分级
  - id: DAT-02
    name: 数据交易安全合规师
    role: 跨境交易合规审查与KYC/KYB
  - id: DAT-01
    name: 数据交易规划师
    role: 跨境交易方案设计
  - id: DAT-03
    name: 数据交易运营师
    role: 跨境交易执行与运营

steps:
  - "[DAM-04] 数据出境安全评估：数据分类分级、敏感数据识别、出境影响评估"
  - "    交付物：《数据出境安全评估报告》《数据分类分级清单》"
  - "[DAT-02] 跨境交易合规审查：接收方资质核查、合同条款审查、监管申报"
  - "    交付物：《跨境合规审查意见书》《标准合同/安全评估申报材料》"
  - "[DAT-01] 跨境交易方案设计：交易模式选择、数据脱敏方案、技术通道规划"
  - "    交付物：《跨境数据交易方案》《技术对接规范》"
  - "[DAT-03] 跨境交易执行运营：通道搭建、传输监控、定期审计"
  - "    交付物：《跨境传输监控报告》《定期合规审计记录》"

decision_gate:
  - name: 出境安全评估
    owner: DAM-04
    rule: 重要数据或超量个人信息须通过国家网信办安全评估，否则不得出境
  - name: 合规审查
    owner: DAT-02
    rule: 接收方所在国/地区数据保护水平须达到等同标准，合同条款须涵盖全部必备条款

acceptance:
  - 数据出境安全评估通过或取得标准合同备案
  - 接收方资质与合同条款审查留痕完整
  - 传输通道加密且具备实时监控能力
  - 定期合规审计频率不低于每季度一次

related_standards:
  - 数据出境安全评估办法
  - 个人信息出境标准合同办法
  - GB/T 35273-2020
